<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konvert Cepat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
        #loading { display: none; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="flex justify-center mb-6">
        <script type="text/javascript">
            atOptions = { 'key' : '03b1cb8ee7c0832d153c554b239fa686', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/03b1cb8ee7c0832d153c554b239fa686/invoke.js"></script>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-2xl p-6 custom-shadow">
        <h1 class="text-xl font-bold text-center mb-6">KONVERT CEPAT</h1>
        
        <form id="dlForm" class="space-y-4">
            <input type="url" id="urlInput" placeholder="Tempel link video..." class="w-full p-4 border rounded-xl outline-none" required>
            <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl">PROSES VIDEO</button>
        </form>

        <div id="loading" class="text-center py-6 font-bold text-indigo-600 animate-pulse">Sabar Lan, lagi diproses...</div>

        <div id="result" class="hidden mt-6 space-y-4">
            <video id="preview" controls class="w-full rounded-xl bg-black"></video>
            
            <button id="saveVideo" class="w-full py-4 bg-green-500 text-white font-bold rounded-xl shadow-lg">
                DOWNLOAD VIDEO SEKARANG
            </button>
            <p class="text-[10px] text-center text-gray-400">Klik tombol hijau, tunggu loading 100% sampai file tersimpan.</p>
        </div>
    </div>

    <script src="https://pl29331539.profitablecpmratenetwork.com/de/48/ad/de48adecd401f473c5c180796b5076eb.js"></script>

    <script>
        let videoDataUrl = "";

        // JURUS SAKTI DOWNLOAD (BLOB METHOD)
        async function forceDownload(url, filename) {
            const btn = document.getElementById('saveVideo');
            const originalText = btn.innerText;
            
            try {
                btn.innerText = "SEDANG MENGUNDUH... 0%";
                btn.disabled = true;

                // Kita ambil datanya secara mentah (blob)
                const response = await fetch(url);
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                
                let receivedLength = 0;
                let chunks = []; 
                
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    // Update progress buat gaya profesional
                    let progress = Math.round((receivedLength / contentLength) * 100);
                    btn.innerText = `SEDANG MENGUNDUH... ${progress}%`;
                }

                // Gabungkan potongan video jadi satu file
                const blob = new Blob(chunks);
                const blobUrl = window.URL.createObjectURL(blob);
                
                // Pancing browser buat nyimpen file
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);

                btn.innerText = "TERSIMPAN!";
            } catch (err) {
                // Kalau gagal (CORS), cara terakhir: buka di tab baru
                window.open(url, '_blank');
                btn.innerText = "GAGAL, COBA LAGI";
            } finally {
                btn.disabled = false;
                setTimeout(() => { btn.innerText = originalText; }, 3000);
            }
        }

        document.getElementById('dlForm').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('urlInput').value;
            document.getElementById('loading').style.display = "block";
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(val)}`);
                const json = await res.json();
                if(json.data) {
                    videoDataUrl = json.data.play || json.data.url;
                    document.getElementById('preview').src = videoDataUrl;
                    document.getElementById('result').classList.remove('hidden');
                }
            } catch(e) { alert("Koneksi gangguan, Lan!"); }
            document.getElementById('loading').style.display = "none";
        };

        document.getElementById('saveVideo').onclick = () => {
            forceDownload(videoDataUrl, "Video_Alan_Project.mp4");
        };
    </script>
</body>
</html>
